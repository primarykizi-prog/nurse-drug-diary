<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ナースのドラッグ手帳</title>
<style>
  :root{
    --cream:#fbf6f0; --card:#ffffff;
    --mint:#7ccdb3; --mint-d:#43b393; --mint-soft:#e6f5ef;
    --pink:#f2a3b8; --pink-d:#e87d99; --pink-soft:#fce7ed;
    --ink:#41514e; --sub:#92a09c; --line:#ede7df;
    --amber:#e6a25a; --amber-soft:#fdf2e1;
    --blue:#7fb2e8; --blue-soft:#e7f0fc;
    --radius:22px; --radius-sm:14px;
    --shadow:0 2px 8px rgba(120,140,135,.10),0 8px 24px rgba(120,140,135,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Yu Gothic","Segoe UI",-apple-system,sans-serif;
    background:#cdbfa8;color:var(--ink);font-size:15px;line-height:1.65}
  button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
  input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:11px 13px;
    border:1.5px solid var(--line);border-radius:13px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--mint)}
  textarea{resize:vertical;min-height:70px}
  label{display:block;font-size:13px;color:var(--sub);margin:0 0 5px 3px;font-weight:700}
  .field{margin-bottom:13px}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:0}
  .muted{color:var(--sub);font-size:13px}

  /* ===== phone shell ===== */
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);
    background-image:radial-gradient(rgba(120,108,86,.06) 1px, transparent 1.5px);background-size:20px 20px;
    position:relative;box-shadow:0 0 50px rgba(0,0,0,.18);padding-bottom:96px}
  .appbar{padding:20px 20px 10px;text-align:center;position:relative}
  .appbar::before{content:'';position:absolute;top:7px;left:22px;width:60px;height:19px;border-radius:2px;
    transform:rotate(-8deg);opacity:.85;box-shadow:0 1px 2px rgba(0,0,0,.08);
    background:repeating-linear-gradient(45deg,#bfe6d6 0 4px,#a9dcc8 4px 8px)}
  .appbar::after{content:'';position:absolute;top:5px;right:26px;width:52px;height:17px;border-radius:2px;
    transform:rotate(7deg);opacity:.9;box-shadow:0 1px 2px rgba(0,0,0,.08);background:#cdeae0;
    background-image:radial-gradient(#ffffffaa 1.5px,transparent 1.7px);background-size:7px 7px}
  .appbar .ttl{font-size:25px;font-weight:800;letter-spacing:.5px;
    display:inline-flex;align-items:center;gap:7px}
  .appbar .ttl .cross{color:var(--mint-d)}.appbar .ttl .heart{color:var(--pink)}
  .appbar .sub{font-size:11px;color:var(--sub);letter-spacing:2px;margin-top:-2px;font-weight:700}
  .content{padding:6px 16px 10px}

  /* team bar */
  .teambar{display:flex;align-items:center;gap:8px;background:var(--mint-soft);
    border-radius:18px;padding:10px 14px;margin:4px 0 16px}
  .teambar .tlabel{font-weight:800;color:var(--mint-d);display:flex;align-items:center;gap:6px;font-size:14px}
  .avatars{display:flex;align-items:center;margin-left:auto}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:12px;border:2px solid var(--mint-soft);margin-left:-8px}
  .av.add{background:#fff;color:var(--mint-d);border:2px dashed var(--mint);margin-left:-2px}

  /* cards */
  .card{background:var(--card);border-radius:var(--radius);padding:16px 16px 16px 30px;margin-bottom:14px;
    position:relative;box-shadow:0 2px 5px rgba(120,140,135,.10),0 10px 22px rgba(120,140,135,.12)}
  .card::before{content:'';position:absolute;left:8px;top:15px;bottom:15px;width:13px;
    background:radial-gradient(circle at 6px 6px, #efe9dd 0 3px, #d7cdb9 3px 3.9px, transparent 4.3px) 0 0/13px 26px repeat-y}
  .card.flat{padding:14px}
  .card.flat::before{display:none}
  .card.tint-mint{background:linear-gradient(180deg,#f1faf6,#fff)}
  .card.tint-pink{background:linear-gradient(180deg,#fdeff3,#fff)}
  .card.tint-amber{background:linear-gradient(180deg,#fdf5ea,#fff)}
  .chead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .chead .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .ic.mint{background:var(--mint-soft)}.ic.pink{background:var(--pink-soft)}.ic.amber{background:var(--amber-soft)}.ic.blue{background:var(--blue-soft)}
  .chead .ct{font-weight:800;font-size:16px}
  .chead .cact{margin-left:auto;display:flex;gap:6px}
  .cfoot{font-size:11px;color:var(--sub);margin-top:10px;display:flex;align-items:center;gap:6px}

  /* buttons */
  .btn{background:var(--mint);color:#fff;padding:11px 17px;border-radius:14px;font-weight:800;
    display:inline-flex;align-items:center;gap:6px;justify-content:center;box-shadow:0 3px 8px rgba(124,205,179,.35)}
  .btn:active{transform:translateY(1px)}
  .btn.pink{background:var(--pink);box-shadow:0 3px 8px rgba(242,163,184,.35)}
  .btn.ghost{background:var(--mint-soft);color:var(--mint-d);box-shadow:none}
  .btn.ghostp{background:var(--pink-soft);color:var(--pink-d);box-shadow:none}
  .btn.subtle{background:#f0ebe3;color:var(--ink);box-shadow:none}
  .btn.danger{background:var(--pink-soft);color:var(--pink-d);box-shadow:none}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:11px}
  .btn.block{width:100%}
  .iconbtn{width:34px;height:34px;border-radius:11px;background:var(--mint-soft);color:var(--mint-d);
    display:flex;align-items:center;justify-content:center;font-size:15px}

  .pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:800}
  .pill.req{background:var(--pink-soft);color:var(--pink-d)}
  .pill.dummy{background:var(--mint);color:#fff}
  .pill.on{background:var(--mint-soft);color:var(--mint-d)}
  .pill.off{background:#f0ebe3;color:var(--sub)}
  .tag{font-size:12px;padding:3px 10px;border-radius:999px;background:#f0ebe3;color:var(--sub);font-weight:700}
  .tag.t{background:var(--mint-soft);color:var(--mint-d)}
  .tag.date{background:var(--amber-soft);color:var(--amber)}
  .tag.stock{background:var(--mint-soft);color:var(--mint-d)}
  .tag.stock.low{background:var(--pink-soft);color:var(--pink-d)}
  .chead.clk{cursor:pointer;border-radius:10px;padding:4px 6px;margin:-4px -6px;transition:background .15s}
  .chead.clk:hover,.chead.clk:active{background:rgba(0,0,0,.04)}
  .chead.clk .cact{margin-left:auto;color:var(--sub);font-size:20px;font-weight:bold;display:flex;align-items:center;gap:4px}
  .chead.clk .countpill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-size:12px;font-weight:800;color:var(--sub)}
  .factag{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:800;display:inline-block;margin:3px 4px 0 0}
  .facdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .facbar{width:6px;align-self:stretch;border-radius:6px;flex-shrink:0}
  .facfilter{display:flex;gap:7px;flex-wrap:wrap;margin:0 2px 14px}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}

  /* dose line (home style) */
  .doseline{display:flex;align-items:center;gap:12px;padding:8px 4px}
  .doseline .when{display:flex;align-items:center;gap:6px;width:62px;font-weight:800;color:var(--ink)}
  .doseline .dn{font-weight:700}
  .doseline .du{margin-left:auto;color:var(--sub);font-weight:700}
  .hr{height:1px;background:var(--line);margin:2px 0}

  /* list item rows */
  .lrow{display:flex;align-items:center;gap:12px;padding:13px;border-radius:var(--radius-sm);
    background:#fff;box-shadow:var(--shadow);margin-bottom:10px}
  .lrow .ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .lrow .grow{flex:1;min-width:0}
  .lrow .t1{font-weight:800}
  .lrow .t2{font-size:12px;color:var(--sub)}
  .lrow .star{font-size:18px;color:#d9d2c8}.lrow .star.on{color:var(--amber)}

  /* patient avatar */
  .pav{width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:18px;flex-shrink:0}

  /* tabs (chips, scrollable) */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:8px 14px;border-radius:999px;background:#fff;color:var(--sub);font-weight:800;font-size:13px;
    white-space:nowrap;box-shadow:var(--shadow);flex-shrink:0}
  .tab.active{background:var(--mint);color:#fff}

  /* med card */
  .med{background:#fff;border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .med.stopped{opacity:.55}
  .med .mname{font-weight:800;font-size:16px}
  .med .mdose{color:var(--sub);font-weight:700;font-size:13px}
  .med .mpurpose{font-size:14px;margin-top:2px}
  .med .mnote{font-size:13px;color:var(--sub);background:#faf7f2;border-radius:10px;padding:9px 11px;margin-top:8px;white-space:pre-wrap}
  .med .acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

  /* check rows */
  .checkrow{display:flex;align-items:center;gap:12px;padding:13px;border-radius:var(--radius-sm);
    background:#fff;box-shadow:var(--shadow);margin-bottom:9px}
  .checkrow .cb{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent}
  .checkrow.done{background:var(--mint-soft)}
  .checkrow.done .cb{background:var(--mint);border-color:var(--mint);color:#fff}
  .checkrow .cn{font-weight:800}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px}
  .cal .d{border-radius:10px;padding:7px 2px;text-align:center;font-size:11px;background:#faf7f2}
  .cal .d .dv{font-weight:800;margin-top:2px}
  .cal .d.full{background:var(--mint-soft)}.cal .d.part{background:var(--amber-soft)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .calgrid.head{margin-bottom:4px}
  .calgrid.head .cw{text-align:center;font-size:11px;color:var(--sub);font-weight:800;padding:2px 0}
  .cd{min-height:48px;border-radius:10px;background:#faf7f2;padding:4px 0 2px;text-align:center;cursor:pointer}
  .cd.empty{background:transparent;cursor:default}
  .cd.today{outline:2px solid var(--mint)}
  .cd.sel{background:var(--mint-soft)}
  .cdn{font-weight:800;font-size:13px}
  .cdd{font-size:10px;line-height:1.15;height:24px;overflow:hidden}
  .adh{display:flex;align-items:center;gap:14px}
  .adh .num{font-size:30px;font-weight:800}
  .progress{height:12px;background:#eee6dc;border-radius:999px;overflow:hidden}
  .progress>span{display:block;height:100%;background:var(--mint);border-radius:999px}

  /* drug info */
  .drug{background:#fff;border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .drug .dn{font-weight:800;font-size:16px}
  .drug .dc{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;background:var(--mint-soft);color:var(--mint-d);font-weight:800;margin-left:6px}
  .drug .da{font-size:12px;color:var(--sub);margin-top:2px}
  .drug dl{margin:10px 0 0;display:grid;grid-template-columns:auto 1fr;gap:5px 12px}
  .drug dt{font-weight:800;color:var(--sub);font-size:13px;white-space:nowrap}
  .drug dd{margin:0;font-size:14px}
  .infobox{background:var(--mint-soft);border-radius:12px;padding:12px;font-size:13px;margin-top:8px}
  .infobox b{color:var(--mint-d)} .infobox a{color:var(--blue)}

  .empty{text-align:center;color:var(--sub);padding:30px 10px}
  .empty .big{font-size:40px;margin-bottom:6px}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(65,81,78,.40);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:#fff;width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:22px;max-height:92vh;overflow:auto;animation:up .22s ease}
  @keyframes up{from{transform:translateY(34px);opacity:.5}to{transform:none;opacity:1}}
  .modal h3{margin:0 0 14px;font-size:19px;font-weight:800}
  .modal .foot{display:flex;gap:10px;margin-top:18px}
  .chipwrap{display:flex;gap:7px;flex-wrap:wrap}
  .chip{padding:8px 13px;border-radius:999px;border:2px solid var(--line);background:#fff;color:var(--sub);font-weight:800;font-size:14px}
  .chip.sel{border-color:var(--mint);background:var(--mint-soft);color:var(--mint-d)}

  /* bottom nav */
  .bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:flex-end;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:40;box-shadow:0 -4px 16px rgba(120,140,135,.08)}
  .nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sub);font-size:10px;font-weight:800;padding:4px 0}
  .nav .ni{font-size:21px;line-height:1}
  .nav.active{color:var(--mint-d)}
  .nav.center{margin-top:-22px}
  .nav.center .ni{width:56px;height:56px;border-radius:18px;background:#3a3633;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 6px 16px rgba(58,54,51,.4);
    border:2px dashed rgba(255,255,255,.55)}
  .nav.center.active .ni{background:var(--mint-d)}

  /* sheet (print) */
  .sheet{background:#fff;border-radius:var(--radius-sm);padding:22px;box-shadow:var(--shadow)}
  .sheet h2.sh{font-size:20px;border-bottom:3px solid var(--mint);padding-bottom:8px;margin:0 0 4px}
  .sheet section{margin-top:16px}
  .sheet section h3{font-size:14px;background:var(--mint);color:#fff;padding:5px 12px;border-radius:9px;display:inline-block;margin:0 0 9px}
  .sheet table{width:100%;border-collapse:collapse;font-size:13px}
  .sheet th,.sheet td{border:1px solid #dfe7e3;padding:6px 8px;text-align:left;vertical-align:top}
  .sheet th{background:var(--mint-soft)}
  .sheet .sig{margin-top:20px;font-size:11px;color:var(--sub);border-top:1px dashed var(--line);padding-top:10px}

  table.simple{width:100%;border-collapse:collapse;font-size:13px}
  table.simple th,table.simple td{padding:8px 7px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  table.simple th{color:var(--sub);font-size:12px}

  @media print{
    body{background:#fff}.app{box-shadow:none;max-width:none;padding:0}
    .appbar,.bottomnav,.tabs,.no-print,.teambar{display:none !important}
    .content{padding:0}.sheet{box-shadow:none;padding:0}
  }
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="ttl"><span class="cross">✚</span> ナースのドラッグ手帳 <span class="heart">♥</span></div>
    <div class="sub">NURSE'S DRUG DIARY</div>
  </div>
  <div class="content" id="content"></div>
  <nav class="bottomnav">
    <button class="nav" data-v="home"   onclick="setView('home')"><span class="ni">🏠</span>ホーム</button>
    <button class="nav" data-v="notes"  onclick="setView('notes')"><span class="ni">📝</span>共有ノート</button>
    <button class="nav center" data-v="chart" onclick="setView('chart')"><span class="ni">📒</span>カルテ</button>
    <button class="nav" data-v="calendar" onclick="setView('calendar')"><span class="ni">📅</span>予定表</button>
    <button class="nav" data-v="more"   onclick="setView('more')"><span class="ni">☰</span>その他</button>
  </nav>
</div>
<div id="modalRoot"></div>

<script>
/* =========================================================
   ナースのドラッグ手帳 (Nurse's Drug Diary)
   端末内保存(localStorage)・患者情報は外部送信なし
   db: { patients:[...], board:[...], team:[{id,name}] }
   patient: {id,name,kana,info,nextVisit,nextVisitNote,
     medications:[{id,name,dose,timing[],purpose,note,start,end,stock,stockAlert,active}],
     health:[], handoffs:[], files:[{id,label,url,date}], intakeLog:{ "YYYY-MM-DD":{ "medId@timing":true } } }
   ========================================================= */
const STORE_KEY='okusuri_note_v1';
const TIMINGS=['朝','昼','夕','眠前','頓服','その他'];
const SCHEDULED=['朝','昼','夕','眠前','その他'];
const TIMING_ICON={'朝':'☀️','昼':'🌤','夕':'🌙','眠前':'🛏','頓服':'💊','その他':'•'};
const PALETTE=['#7ccdb3','#f2a3b8','#7fb2e8','#e6a25a','#a99be0','#5fbf9e','#ef9aa9'];
/* 施設（色分け・複数所属OK）。名前を変えたいときはここを編集 */
const FACILITIES=[
  {name:'頚城',   color:'#5b9bd5', soft:'#e7f0fc'},
  {name:'仲町',   color:'#e87d99', soft:'#fce7ed'},
  {name:'すみのや', color:'#dd9234', soft:'#fdf2e1'}
];
function facMeta(name){ return FACILITIES.find(f=>f.name===name); }
function facColor(p){ const f=facMeta((p.facilities||[])[0]); return f?f.color:''; }
function facDot(p){ const c=facColor(p); return c?`<span class="facdot" style="background:${c}"></span>`:''; }
function facChips(p){ return (p.facilities||[]).map(n=>{ const f=facMeta(n); return f?`<span class="factag" style="background:${f.soft};color:${f.color}">${esc(n)}</span>`:''; }).join(''); }
const BOARD_CATS={topic:['お知らせ','今週のナース事変','ヒヤリ・気づき','その他'],
                  tips:['AIの使い方','パソコンの使い方','アプリの使い方','その他']};

/* ---- 薬データベース（約50種・簡易要約） ---- */
const DRUG_DB=[
 {n:'アムロジピン',a:['ノルバスク','アムロジン'],c:'降圧薬(Ca拮抗薬)',e:'血管を広げて血圧を下げる。狭心症にも使う。',s:'足のむくみ、ほてり、動悸、頭痛、歯ぐきの腫れ',w:'グレープフルーツで効きが強まることがある。自己判断で中止しない。'},
 {n:'ニフェジピン',a:['アダラート'],c:'降圧薬(Ca拮抗薬)',e:'血圧を下げる。狭心症にも。',s:'ほてり、頭痛、動悸、むくみ',w:'徐放錠は割らずに飲む。グレープフルーツ注意。'},
 {n:'ロサルタン',a:['ニューロタン'],c:'降圧薬(ARB)',e:'血圧を下げ、腎臓を保護する。',s:'めまい、だるさ、高カリウム血症',w:'腎機能・カリウム値の確認が必要。妊娠中は禁忌。'},
 {n:'カンデサルタン',a:['ブロプレス'],c:'降圧薬(ARB)',e:'血圧を下げる。心不全にも。',s:'めまい、だるさ、高カリウム血症',w:'妊娠中は禁忌。脱水に注意。'},
 {n:'テルミサルタン',a:['ミカルディス'],c:'降圧薬(ARB)',e:'血圧を下げる。',s:'めまい、高カリウム血症',w:'妊娠中は禁忌。'},
 {n:'エナラプリル',a:['レニベース'],c:'降圧薬(ACE阻害薬)',e:'血圧を下げる。心不全にも。',s:'空咳、めまい、高カリウム血症',w:'空咳が出やすい。妊娠中は禁忌。'},

let view='home';

let boardTab='topic';
let calRef=new Date();
let calSel=today();

let homeFocus=null;
let careFilter='all';

function load(){
  try{const d=JSON.parse(localStorage.getItem(STORE_KEY)); if(d&&d.patients)return migrate(d);}catch(e){}
  return {patients:[],board:[],team:[],events:[],customDrugs:[]};
}
function migrate(d){
  d.board=d.board||[]; d.team=d.team||[]; d.events=d.events||[]; d.customDrugs=d.customDrugs||[];
  d.patients.forEach(p=>{ p.intakeLog=p.intakeLog||{}; p.files=p.files||[]; p.health=p.health||[]; p.handoffs=p.handoffs||[];
    p.care=p.care||[]; p.log=p.log||[]; if(p.summary===undefined)p.summary=''; p.facilities=p.facilities||[]; });
  return d;
}
function allDrugs(){ return DRUG_DB.concat((db.customDrugs||[]).map(x=>({...x,custom:true}))); }
function careStatusRank(s){ return ({'継続':0,'新規':1,'終了':2})[s] ?? 1; }
function save(){ localStorage.setItem(STORE_KEY,JSON.stringify(db)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function today(){ return ymd(new Date()); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s){ if(!s)return''; const[y,m,d]=s.split('-'); return `${y}/${m}/${d}`; }
function fmtMd(s){ if(!s)return''; const[,m,d]=s.split('-'); return `${m}/${d}`; }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function cur(){ const p=db.patients.find(p=>p.id===currentId); if(p)migrate({patients:[p],board:db.board,team:db.team}); return p||null; }
function colorOf(i){ return PALETTE[i%PALETTE.length]; }
function initials(name){ name=(name||'').replace(/\s/g,''); return name.slice(0,2)||'？'; }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }

/* ===== ナビ ===== */
function setView(v){ view=v; homeFocus=null; if(v==='chart'&&db.patients.length===0)currentId=null; render(); }
function render(){
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.v===view));
  const c=document.getElementById('content');
  ({home:renderHome,notes:renderNotes,chart:renderChart,calendar:renderCalendar,notify:renderNotify,more:renderMore}[view])(c);
  window.scrollTo(0,0);
}

/* ===== チームバー ===== */
function teamBar(){
  const avs=db.team.slice(0,6).map((m,i)=>`<span class="av" style="background:${colorOf(i)}" title="${esc(m.name)}">${esc(initials(m.name))}</span>`).join('');
  return `<div class="teambar">
    <span class="tlabel">👥 Nurse Team</span>
    <span class="avatars">${avs}<span class="av add" onclick="openTeamModal()">＋</span></span>
  </div>`;
}

/* ===== ホーム ===== */
function scheduleForPatient(p,date){
  const out=[];
  p.medications.forEach(m=>{ if(m.active===false)return; if(m.start&&date<m.start)return; if(m.end&&date>m.end)return;
    (m.timing||[]).forEach(t=>{ if(SCHEDULED.includes(t))out.push({m,t}); }); });
  return out;
}
function isTaken(p,date,medId,t){ return !!(p.intakeLog[date]&&p.intakeLog[date][medId+'@'+t]); }
function openHomeFocus(k){ homeFocus=k; render(); window.scrollTo(0,0); }
function closeHomeFocus(){ homeFocus=null; render(); window.scrollTo(0,0); }
function renderHome(c){
  if(homeFocus){ return renderHomeFocus(c); }
  const d=today();
  const care=[]; db.patients.forEach(p=>(p.care||[]).forEach(it=>{ if(it.status==='継続'||it.status==='新規')care.push({p,it}); }));
  care.sort((a,b)=>careStatusRank(a.it.status)-careStatusRank(b.it.status)||(b.it.date+b.it.id).localeCompare(a.it.date+a.it.id));
  const low=[]; db.patients.forEach(p=>p.medications.forEach(m=>{
    if(m.active!==false&&m.stock!=null&&m.stock!==''&&Number(m.stock)<=(Number(m.stockAlert)||7))
      low.push({p,m}); }));
  const visits=db.patients.filter(p=>p.nextVisit).map(p=>({p,dd:daysBetween(d,p.nextVisit)}))
    .filter(v=>v.dd>=-1).sort((a,b)=>a.dd-b.dd);
  const imp=[]; db.patients.forEach(p=>p.handoffs.filter(h=>h.important).forEach(h=>imp.push({p,h})));
  imp.sort((a,b)=>(b.h.date+b.h.id).localeCompare(a.h.date+a.h.id));
  const sumCnt=db.patients.filter(p=>p.summary).length;

  const head=(k,ic,emo,ct,n)=>`<div class="chead clk" onclick="openHomeFocus('${k}')">
    <div class="ic ${ic}">${emo}</div><div class="ct">${ct}</div>
    <div class="cact"><span class="countpill">${n}</span><span>›</span></div></div>`;

  c.innerHTML = teamBar()
    + `<div class="card tint-pink">${head('summary','pink','🚑','緊急時サマリー',db.patients.length)}
        <p class="muted" style="margin-top:2px">急な受診・引き継ぎのとき。利用者さんを選ぶと、その人の状況サマリーがすぐ開きます。</p>
        ${db.patients.length? `<div class="chipwrap">${db.patients.slice(0,6).map(p=>`<button class="chip" onclick="openPatient('${p.id}')">${facDot(p)}${p.summary?'🚑 ':'👤 '}${esc(p.name)}</button>`).join('')}${db.patients.length>6?`<button class="chip" onclick="openHomeFocus('summary')">… 全${db.patients.length}人</button>`:''}</div>`
          : `<div class="muted">まだ利用者がいません。下の「📒 カルテ」から追加できます。</div>`}
       </div>`
    + `<div class="card tint-mint">${head('care','mint','🩹','今日の処置・お願い',care.length)}
        ${care.length? care.slice(0,3).map(({p,it})=>`<div class="lrow" onclick="openPatient('${p.id}')">
            <div class="ic mint">${it.status==='継続'?'🔁':'🆕'}</div>
            <div class="grow"><div class="t1">${esc(p.name)} <span class="pill ${it.status==='継続'?'on':'req'}">${esc(it.status)}</span></div>
            <div class="t2">${esc(it.title)}${it.detail?' ／ '+esc(it.detail):''}</div></div></div>`).join('') + (care.length>3?`<button class="btn ghost sm block" onclick="openHomeFocus('care')">… 他 ${care.length-3}件を見る</button>`:'')
          : `<div class="muted">継続・新規の処置がある利用者さんの<b>お名前と処置の内容</b>が、ここに表示されます。<br>見出しの「›」を押すと終了済みも含めて全件見られます。</div>`}
       </div>`
    + `<div class="card ${low.length?'tint-pink':''}">${head('low','pink','⚠️','残薬がすくない薬',low.length)}
        ${low.length? low.slice(0,3).map(({p,m})=>`<div class="lrow" onclick="openPatient('${p.id}')">
            <div class="ic pink">💊</div><div class="grow"><div class="t1">${esc(m.name)}</div>

          : `<div class="muted">不足している薬はありません。<br>見出しの「›</span>」で全員のお薬を残量順に一覧できます。</div>`}
       </div>`

        ${visits.length? visits.slice(0,3).map(({p,dd})=>`<div class="lrow" onclick="openPatient('${p.id}')">
            <div class="ic blue">📅</div><div class="grow"><div class="t1">${esc(p.name)}</div>
            <div class="t2">${fmtDate(p.nextVisit)}${p.nextVisitNote?' ／ '+esc(p.nextVisitNote):''}</div></div>
            <span class="pill ${dd<=1?'req':'on'}">${dd<0?'過ぎ':dd===0?'今日':'あと'+dd+'日'}</span></div>`).join('') + (visits.length>3?`<button class="btn ghost sm block" onclick="openHomeFocus('visits')">… 他 ${visits.length-3}件を見る</button>`:'')

        ${imp.length? imp.slice(0,3).map(({p,h})=>`<div class="lrow" onclick="openPatient('${p.id}')">
            <div class="ic amber">⚠️</div><div class="grow"><div class="t1">${esc(p.name)}</div>
            <div class="t2">${esc(h.text)}</div></div></div>`).join('') + (imp.length>3?`<button class="btn ghost sm block" onclick="openHomeFocus('imp')">… 他 ${imp.length-3}件を見る</button>`:'')
          : `<div class="muted">重要な申し送りはありません。</div>`}
       </div>`
    + `<button class="btn block" onclick="setView('chart')">📒 カルテ（利用者一覧）を見る</button>`;
}

/* ===== ホーム → 各セクションの詳細（一覧）画面 ===== */
function renderHomeFocus(c){

  const back=`<button class="btn ghost sm" onclick="closeHomeFocus()">‹ ホームへ</button>`;
  const empty=(emo,msg,btnLabel,btnAct)=>`<div class="empty"><div class="big">${emo}</div><p class="muted">${msg}</p>${btnAct?`<button class="btn" onclick="${btnAct}">${btnLabel}</button>`:''}</div>`;
  if(homeFocus==='summary'){
    const list=[...db.patients].sort((a,b)=>(b.summary?1:0)-(a.summary?1:0));
    const body=list.length? list.map((p,i)=>{
      const fc=facColor(p); const preview=p.summary?p.summary.replace(/\n/g,' ').slice(0,60)+(p.summary.length>60?'…':''):'（サマリー未記入）';
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="pav" style="background:${fc||colorOf(i)}">${esc(initials(p.name))}</div>
        <div class="grow"><div class="t1">${p.summary?'🚑 ':'👤 '}${esc(p.name)}</div>
          <div class="t2">${esc(preview)}</div>${facChips(p)}</div>
        <span style="color:var(--sub)">›</span></div>`;}).join('')
      : empty('🚑','まだ利用者がいません。','＋ 利用者を追加',"setView('chart');closeHomeFocus()");
    c.innerHTML = back+`<div class="chead" style="margin:12px 2px 10px"><div class="ic pink">🚑</div><div class="ct">緊急時サマリー（${list.length}人）</div></div>
      <p class="muted">👤 サマリー未記入 ／ 🚑 サマリーあり。タップでその人のサマリーが開きます。</p>${body}`;

  }
  if(homeFocus==='care'){
    const all=[]; db.patients.forEach(p=>(p.care||[]).forEach(it=>all.push({p,it})));
    all.sort((a,b)=>careStatusRank(a.it.status)-careStatusRank(b.it.status)||(b.it.date+b.it.id).localeCompare(a.it.date+a.it.id));
    const filt=careFilter==='all'?all:all.filter(x=>x.it.status===careFilter);
    const chip=(k,l)=>`<button class="chip ${careFilter===k?'sel':''}" onclick="careFilter='${k}';render()">${l}</button>`;
    const body=filt.length? filt.map(({p,it})=>{
      const fc=facColor(p);
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="ic mint">${it.status==='継続'?'🔁':it.status==='新規'?'🆕':'✅'}</div>
        <div class="grow"><div class="t1">${esc(p.name)} <span class="pill ${it.status==='継続'?'on':it.status==='新規'?'req':'off'}">${esc(it.status)}</span></div>
          <div class="t2">${esc(it.title)}${it.detail?' ／ '+esc(it.detail):''}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">${fmtDate(it.date)}</div></div></div>`;}).join('')
      : empty('🩹','該当する処置・お願いはありません。','📅 予定表で見る',"setView('calendar');closeHomeFocus()");
    c.innerHTML = back+`<div class="chead" style="margin:12px 2px 10px"><div class="ic mint">🩹</div><div class="ct">処置・お願い（${all.length}件）</div></div>
      <div class="chipwrap" style="margin-bottom:10px">${chip('all','すべて')}${chip('継続','🔁 継続')}${chip('新規','🆕 新規')}${chip('終了','✅ 終了')}</div>
      ${body}<div style="height:10px"></div>
      <button class="btn ghost block" onclick="setView('calendar');closeHomeFocus()">📅 予定表（カレンダー）で見る</button>`;
    return;
  }
  if(homeFocus==='low'){
    const all=[]; db.patients.forEach(p=>p.medications.forEach(m=>{
      if(m.active!==false&&m.stock!=null&&m.stock!=='')all.push({p,m,low:Number(m.stock)<=(Number(m.stockAlert)||7)});
    }));
    all.sort((a,b)=>Number(a.m.stock)-Number(b.m.stock));
    const body=all.length? all.map(({p,m,low})=>{
      const fc=facColor(p);
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="ic ${low?'pink':'mint'}">💊</div>
        <div class="grow"><div class="t1">${esc(m.name)} <span class="muted" style="font-size:12px">${esc(m.dose||'')}</span></div>
          <div class="t2">${esc(p.name)} ／ 残り ${esc(String(m.stock))}回分</div></div>
        <span class="pill ${low?'req':'on'}">${low?'補充':'OK'}</span></div>`;}).join('')
      : empty('💊','残量が記録されている薬がありません。',null,null);
    c.innerHTML = back+`<div class="chead" style="margin:12px 2px 10px"><div class="ic pink">⚠️</div><div class="ct">残薬チェック（${all.length}件）</div></div>
      <p class="muted">残り回数が少ない順に並んでいます。タップで該当の利用者さんを開きます。</p>${body}`;
    return;
  }
  if(homeFocus==='visits'){
    const all=db.patients.filter(p=>p.nextVisit).map(p=>({p,dd:daysBetween(d,p.nextVisit)})).sort((a,b)=>a.dd-b.dd);
    const body=all.length? all.map(({p,dd})=>{
      const fc=facColor(p);
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="ic blue">📅</div>
        <div class="grow"><div class="t1">${esc(p.name)}</div>
          <div class="t2">${fmtDate(p.nextVisit)}${p.nextVisitNote?' ／ '+esc(p.nextVisitNote):''}</div></div>
        <span class="pill ${dd<=1?'req':dd<0?'off':'on'}">${dd<0?Math.abs(dd)+'日前':dd===0?'今日':'あと'+dd+'日'}</span></div>`;}).join('')
      : empty('🏥','受診予定はありません。利用者編集で「次回の受診予定」を入れると出ます。','📅 予定表で見る',"setView('calendar');closeHomeFocus()");
    c.innerHTML = back+`<div class="chead" style="margin:12px 2px 10px"><div class="ic blue">🏥</div><div class="ct">受診予定（${all.length}人）</div></div>${body}
      <div style="height:10px"></div>
      <button class="btn ghost block" onclick="setView('calendar');closeHomeFocus()">📅 予定表（カレンダー）で見る</button>`;
    return;
  }
  if(homeFocus==='imp'){
    const all=[]; db.patients.forEach(p=>p.handoffs.filter(h=>h.important).forEach(h=>all.push({p,h})));
    all.sort((a,b)=>(b.h.date+b.h.id).localeCompare(a.h.date+a.h.id));
    const body=all.length? all.map(({p,h})=>{
      const fc=facColor(p);
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="ic amber">⚠️</div>
        <div class="grow"><div class="t1">${esc(p.name)}</div>
          <div class="t2">${esc(h.text)}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">${fmtDate(h.date)}${h.author?' ／ '+esc(h.author):''}</div></div></div>`;}).join('')
      : empty('📣','重要な申し送りはありません。','カルテで申し送りを見る',"setView('chart');closeHomeFocus()");
    c.innerHTML = back+`<div class="chead" style="margin:12px 2px 10px"><div class="ic amber">📣</div><div class="ct">重要な申し送り（${all.length}件）</div></div>${body}`;
    return;
  }
  closeHomeFocus();
}

/* ===== カルテ（利用者一覧／詳細） ===== */
function openPatient(id){ currentId=id; currentTab='summary'; view='chart'; render(); }
function renderChart(c){
  if(!currentId){ // 一覧
    const shown=db.patients.map((p,i)=>({p,i})).filter(({p})=>!facFilter||(p.facilities||[]).includes(facFilter));
    const list=db.patients.length? (shown.length? shown.map(({p,i})=>{
      const meds=p.medications.filter(m=>m.active!==false).length;
      const fc=facColor(p);
      return `<div class="lrow" onclick="openPatient('${p.id}')">
        ${fc?`<div class="facbar" style="background:${fc}"></div>`:''}
        <div class="pav" style="background:${fc||colorOf(i)}">${esc(initials(p.name))}</div>
        <div class="grow"><div class="t1">${esc(p.name)}</div>
          <div class="t2">${esc(p.kana||'')}　薬 ${meds}件</div>${facChips(p)}</div>
        <span style="color:var(--sub)">›</span></div>`;
    }).join('') : `<div class="empty"><p class="muted">「${esc(facFilter)}」の利用者さんはいません。</p></div>`)
      : `<div class="empty"><div class="big">📒</div><p class="muted">まだ利用者がいません。<br>「＋ 利用者を追加」から始めましょう。</p></div>`;
    const fbtn=(name,col)=>`<button class="chip ${facFilter===name?'sel':''}" style="${facFilter===name&&col?`background:${col};border-color:${col};color:#fff`:''}" onclick="facFilter='${name}';render()">${name||'すべて'}</button>`;
    c.innerHTML = `<div class="chead" style="margin:2px 2px 12px"><div class="ic mint">📒</div><div class="ct">カルテ（利用者一覧）</div></div>`
      + `<div class="facfilter">${fbtn('','')}${FACILITIES.map(f=>fbtn(f.name,f.color)).join('')}</div>`
      + `<button class="btn block" onclick="openPatientModal()">＋ 利用者を追加</button><div style="height:14px"></div>`
      + list;
    return;
  }
  const p=cur(); if(!p){ currentId=null; return renderChart(c); }
  const i=db.patients.findIndex(x=>x.id===p.id);
  let visit='';
  if(p.nextVisit){ const dd=daysBetween(today(),p.nextVisit);
    visit=`<div class="tag date" style="margin-top:6px">🏥 受診 ${fmtDate(p.nextVisit)} ${dd<0?'(過ぎ)':dd===0?'(今日)':'(あと'+dd+'日)'}</div>`; }
  c.innerHTML = `
    <button class="btn ghost sm" onclick="currentId=null;render()">‹ 一覧へ</button>
    <div class="card tint-mint" style="margin-top:10px">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div class="pav" style="background:${facColor(p)||colorOf(i)}">${esc(initials(p.name))}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:18px">${esc(p.name)}</div>
          <div class="muted">${esc(p.kana||'')}</div>
          <div class="muted">${esc(p.info||'')||'基本情報は未入力'}</div>
          ${facChips(p)?`<div style="margin-top:4px">${facChips(p)}</div>`:''}${visit}</div>
        <button class="iconbtn" onclick="openPatientModal('${p.id}')">✎</button>
      </div>
    </div>
    <div class="tabs">
      ${ctab('summary','🚑 経過・サマリー')}${ctab('med','💊 薬')}${ctab('care','🩹 処置・お願い')}${ctab('health','🩺 健康')}${ctab('handoff','📝 申し送り')}${ctab('files','📎 資料')}${ctab('sheet','🖨 説明シート')}
    </div>
    <div id="tabBody"></div>`;
  renderCTab();
}
function ctab(k,l){ return `<button class="tab ${currentTab===k?'active':''}" onclick="currentTab='${k}';renderCTab()">${l}</button>`; }
function renderCTab(){ const b=document.getElementById('tabBody'); if(!b)return;
  (({summary:renderSummary,med:renderMeds,care:renderCare,health:renderHealth,handoff:renderHandoff,files:renderFiles,sheet:renderSheet}[currentTab])||renderSummary)(b); }

/* 薬 */
function medDateLabel(m){ if(!m.start)return''; const d=daysBetween(m.start,today()); return `${fmtDate(m.start)}から（${d>=0?d+'日目':'予定'}）`; }
function renderMeds(b){
  const p=cur(); const meds=p.medications;
  const body = meds.length? meds.map(m=>{
    const low=(m.stock!=null&&m.stock!==''&&Number(m.stock)<=(Number(m.stockAlert)||7));
    return `<div class="med ${m.active===false?'stopped':''}">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div><span class="mname">${esc(m.name)}</span> <span class="mdose">${esc(m.dose||'')}</span></div>
        <span class="pill ${m.active===false?'off':'on'}" style="margin-left:auto">${m.active===false?'休薬中':'服用中'}</span>
      </div>
      <div class="tags">
        ${(m.timing||[]).map(t=>`<span class="tag t">${TIMING_ICON[t]||''}${esc(t)}</span>`).join('')}
        ${m.start?`<span class="tag date">📅 ${medDateLabel(m)}</span>`:''}
        ${(m.stock!=null&&m.stock!=='')?`<span class="tag stock ${low?'low':''}">💊 残${esc(String(m.stock))}回${low?' ⚠️':''}</span>`:''}
      </div>
      ${m.purpose?`<div class="mpurpose">🎯 ${esc(m.purpose)}</div>`:''}
      ${m.note?`<div class="mnote">${esc(m.note)}</div>`:''}
      <div class="acts">
        <button class="btn ghost sm" onclick="openMedModal('${m.id}')">編集</button>
        ${m.fileUrl?`<a class="btn ghostp sm" href="${esc(m.fileUrl)}" target="_blank" rel="noopener" style="text-decoration:none">📎 PDFを開く</a>`:''}
        ${(m.stock!=null&&m.stock!=='')?`<button class="btn ghost sm" onclick="refill('${m.id}')">補充</button>`:''}
        <button class="btn ghost sm" onclick="toggleMed('${m.id}')">${m.active===false?'再開':'休薬'}</button>
        <button class="btn danger sm" onclick="delMed('${m.id}')">削除</button>
      </div></div>`;}).join('')
    : `<div class="empty"><div class="big">💊</div><p class="muted">まだ薬が登録されていません</p></div>`;
  b.innerHTML=`<button class="btn block" onclick="openMedModal()">＋ 薬を追加</button><div style="height:14px"></div>${body}`;
}
function toggleMed(id){ const m=cur().medications.find(x=>x.id===id); m.active=(m.active===false); save(); renderCTab(); }
function delMed(id){ if(!confirm('この薬を削除しますか？'))return; const p=cur(); p.medications=p.medications.filter(x=>x.id!==id); save(); renderCTab(); }
function refill(id){ const m=cur().medications.find(x=>x.id===id); const v=prompt('補充後の残り回数を入力',m.stock||''); if(v===null)return;
  const n=parseInt(v,10); if(isNaN(n)){alert('数字を入力してください');return;} m.stock=n; save(); renderCTab(); }

/* 服薬チェック */
function toggleIntake(date,medId,t){
  const p=cur(); const m=p.medications.find(x=>x.id===medId); p.intakeLog[date]=p.intakeLog[date]||{};
  const k=medId+'@'+t;
  if(p.intakeLog[date][k]){ delete p.intakeLog[date][k]; if(m&&m.stock!=null&&m.stock!=='')m.stock=Number(m.stock)+1; }
  else{ p.intakeLog[date][k]=true; if(m&&m.stock!=null&&m.stock!==''&&Number(m.stock)>0)m.stock=Number(m.stock)-1; }
  save(); renderCTab();
}
function renderCheck(b){
  const p=cur(); const d=today(); const order={'朝':0,'昼':1,'夕':2,'眠前':3,'その他':4};
  const sched=scheduleForPatient(p,d).sort((a,c)=>order[a.t]-order[c.t]);
  const todayHtml = sched.length? sched.map(({m,t})=>{ const done=p.intakeLog[d]&&p.intakeLog[d][m.id+'@'+t];
    return `<div class="checkrow ${done?'done':''}" onclick="toggleIntake('${d}','${m.id}','${t}')">
      <div class="cb">✓</div><div><span class="tag t" style="margin-right:6px">${TIMING_ICON[t]||''}${t}</span>
      <span class="cn">${esc(m.name)}</span> <span class="muted">${esc(m.dose||'')}</span></div>
      <div style="margin-left:auto" class="muted">${done?'済み':'未'}</div></div>`; }).join('')
    : `<p class="muted">今日 予定の定期薬はありません（頓服は薬タブから）。</p>`;
  let totE=0,totT=0; const cells=[];
  for(let i=6;i>=0;i--){ const dt=new Date(); dt.setDate(dt.getDate()-i); const ds=ymd(dt); let e=0,t=0;
    scheduleForPatient(p,ds).forEach(({m,t:tt})=>{ e++; if(p.intakeLog[ds]&&p.intakeLog[ds][m.id+'@'+tt])t++; });
    totE+=e; totT+=t; const cls=e===0?'':(t>=e?'full':(t>0?'part':''));
    cells.push(`<div class="d ${cls}"><div>${['日','月','火','水','木','金','土'][dt.getDay()]}</div>
      <div class="dv">${dt.getDate()}</div><div style="font-size:10px;color:var(--sub)">${e?t+'/'+e:'-'}</div></div>`); }
  const rate=totE?Math.round(totT/totE*100):null;
  b.innerHTML=`
    <div class="card"><div class="chead"><div class="ic mint">✅</div><div class="ct">今日の服薬（${fmtDate(d)}）</div></div>
      <p class="muted" style="margin-top:-4px">飲んだらタップ。残薬を登録した薬は自動で1減ります。</p>${todayHtml}</div>
    <div class="card"><div class="chead"><div class="ic mint">📅</div><div class="ct">直近7日</div></div>
      <div class="adh"><div><div class="num" style="color:${rate==null?'var(--sub)':rate>=80?'var(--mint-d)':rate>=50?'var(--amber)':'var(--pink-d)'}">${rate==null?'—':rate+'%'}</div>
        <div class="muted">チェック率</div></div><div style="flex:1"><div class="cal">${cells.join('')}</div></div></div></div>`;
}

/* 健康 */
function renderHealth(b){
  const p=cur(); const hs=[...p.health].sort((a,c)=>c.date.localeCompare(a.date));
  const body=hs.length? `<div class="card flat" style="padding:6px 12px"><table class="simple">
    <tr><th>日付</th><th>血圧</th><th>体温</th><th>脈</th><th>SpO₂</th><th>メモ</th><th></th></tr>
    ${hs.map(h=>`<tr><td>${fmtMd(h.date)}</td><td>${esc(h.bp||'')}</td><td>${esc(h.temp||'')}</td><td>${esc(h.pulse||'')}</td>
      <td>${esc(h.spo2||'')}</td><td>${esc(h.note||'')}</td><td><button class="btn danger sm" onclick="delHealth('${h.id}')">×</button></td></tr>`).join('')}
    </table></div>` : `<div class="empty"><div class="big">🩺</div><p class="muted">健康状態の記録がありません</p></div>`;
  b.innerHTML=`<button class="btn block" onclick="openHealthModal()">＋ 健康状態を記録</button><div style="height:14px"></div>${body}`;
}
function delHealth(id){ if(!confirm('この記録を削除しますか？'))return; const p=cur(); p.health=p.health.filter(x=>x.id!==id); save(); renderCTab(); }

/* 申し送り */
function renderHandoff(b){
  const p=cur(); const hs=[...p.handoffs].sort((a,c)=>(c.date+c.id).localeCompare(a.date+a.id));

function openSummaryModal(){ const p=cur();
  openModal(`<h3>緊急時サマリーの編集</h3>
    <div class="field"><label>急な受診・引き継ぎでも状況が伝わる要点</label>
      <textarea id="f_summary" style="min-height:210px" placeholder="例）90歳女性。アルツハイマー型認知症・慢性心不全。直近2週間で食欲低下、夜間不穏あり。むくみ増加傾向で利尿剤調整中。キーパーソン：長女（℡ 090-...）。">${esc(p.summary||'')}</textarea></div>
    <div class="foot"><button class="btn subtle block" onclick="closeModal()">キャンセル</button>
      <button class="btn block" onclick="saveSummary()">保存</button></div>`);
  setTimeout(()=>document.getElementById('f_summary').focus(),50); }
function saveSummary(){ cur().summary=val('f_summary'); save(); closeModal(); render(); }
function draftSummary(){
  const p=cur(); const L=[];
  if(p.info)L.push('■ 基本情報：'+p.info);
  const meds=p.medications.filter(m=>m.active!==false);
  if(meds.length)L.push('■ 服用中の薬：'+meds.map(m=>m.name+(m.dose?'('+m.dose+')':'')).join('、'));
  const care=p.care.filter(c=>c.status!=='終了');
  if(care.length)L.push('■ 処置・継続：'+care.map(c=>c.title).join('、'));
  const recent=[...p.log].sort((a,c)=>(c.date+c.id).localeCompare(a.date+a.id)).slice(0,5);
  if(recent.length)L.push('■ 最近の経過：\n'+recent.map(l=>'・'+fmtDate(l.date)+' '+l.text.replace(/\n/g,' ')).join('\n'));
  const imp=p.handoffs.filter(h=>h.important);
  if(imp.length)L.push('■ 要確認：'+imp.map(h=>h.text).join(' ／ '));
  const h=[...p.health].sort((a,c)=>c.date.localeCompare(a.date))[0];
  if(h)L.push('■ 直近バイタル('+fmtDate(h.date)+')：'+[h.bp&&'BP '+h.bp,h.temp&&'BT '+h.temp,h.pulse&&'P '+h.pulse,h.spo2&&'SpO2 '+h.spo2].filter(Boolean).join(' / '));
  const draft=L.join('\n');
  if(!draft){ alert('下書きの材料がまだありません。薬・経過・申し送り・健康状態などを登録してください。'); return; }
  if(p.summary && !confirm('現在のサマリーを下書きで置き換えますか？（今の内容は消えます）'))return;
  p.summary=draft; save(); render();
}

/* ===== お知らせ ===== */
function renderNotify(c){
  const d=today(); const items=[];
  db.patients.forEach(p=>p.medications.forEach(m=>{ if(m.active!==false&&m.stock!=null&&m.stock!==''&&Number(m.stock)<=(Number(m.stockAlert)||7))
    items.push({ic:'pink',emo:'💊',t1:`${m.name}（${p.name}）`,t2:`残り ${m.stock}回分 — 補充をおすすめします`,pid:p.id}); }));
  db.patients.filter(p=>p.nextVisit).forEach(p=>{ const dd=daysBetween(d,p.nextVisit);
    if(dd>=-1&&dd<=14)items.push({ic:'blue',emo:'🏥',t1:`受診予定：${p.name}`,t2:`${fmtDate(p.nextVisit)}（${dd<0?'過ぎ':dd===0?'今日':'あと'+dd+'日'}）`,pid:p.id}); });
  db.patients.forEach(p=>p.handoffs.filter(h=>h.important).forEach(h=>items.push({ic:'amber',emo:'⚠️',t1:`要確認：${p.name}`,t2:h.text,pid:p.id})));
  db.board.filter(b=>b.pinned).forEach(b=>items.push({ic:'mint',emo:'📌',t1:b.title,t2:'共有ノート（'+(b.cat||'')+'）',note:true}));
  c.innerHTML=`<div class="chead" style="margin:2px 2px 12px"><div class="ic amber">🔔</div><div class="ct">お知らせ</div></div>`

function eventsOn(ds){
  const out=[];
  db.patients.forEach(p=>{ if(p.nextVisit===ds)out.push({icon:'🏥',cls:'blue',label:'受診：'+p.name+(p.nextVisitNote?'（'+p.nextVisitNote+'）':''),pid:p.id}); });
  db.patients.forEach(p=>(p.care||[]).forEach(it=>{ if(it.date===ds&&it.status!=='終了')out.push({icon:'🩹',cls:'mint',label:it.title+'（'+p.name+'）',pid:p.id}); }));
  (db.events||[]).forEach(ev=>{ if(ev.date===ds){ const p=db.patients.find(x=>x.id===ev.pid); out.push({icon:'📌',cls:'amber',label:ev.title+(p?'（'+p.name+'）':''),pid:ev.pid,evid:ev.id}); } });
  return out;
}
function renderCalendar(c){
  const y=calRef.getFullYear(), mo=calRef.getMonth();
  const startDow=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate(), tdy=today();
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cd empty"></div>`;
  for(let dn=1;dn<=days;dn++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
    const dots=[...new Set(eventsOn(ds).map(e=>e.icon))].slice(0,3).join('');
    cells+=`<div class="cd ${ds===calSel?'sel':''} ${ds===tdy?'today':''}" onclick="calSel='${ds}';render()">
      <div class="cdn">${dn}</div><div class="cdd">${dots}</div></div>`;
  }
  const evs=eventsOn(calSel);
  const selList=evs.length? evs.map(e=>`<div class="lrow" ${e.pid?`onclick="openPatient('${e.pid}')"`:''}>
      <div class="ic ${e.cls}">${e.icon}</div><div class="grow"><div class="t1">${esc(e.label)}</div></div>
      ${e.evid?`<button class="btn danger sm" onclick="event.stopPropagation();openEventModal('${calSel}','${e.evid}')">編集</button>`:''}</div>`).join('')
    : `<div class="muted" style="padding:8px 2px">予定はありません</div>`;
  c.innerHTML=`
    <div class="chead" style="margin:2px 2px 10px"><div class="ic blue">📅</div><div class="ct">予定表</div></div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:10px">
        <button class="iconbtn" onclick="calRef=new Date(${y},${mo-1},1);render()">‹</button>
        <div style="font-weight:800;font-size:17px">${y}年 ${mo+1}月</div>
        <button class="iconbtn" onclick="calRef=new Date(${y},${mo+1},1);render()">›</button>
      </div>
      <div class="calgrid head">${['日','月','火','水','木','金','土'].map(w=>`<div class="cw">${w}</div>`).join('')}</div>
      <div class="calgrid">${cells}</div>
      <div class="muted" style="margin-top:8px;text-align:center">🏥 受診　🩹 処置・ケア　📌 その他の予定</div>
    </div>
    <div class="card">
      <div class="chead"><div class="ic mint">🗓</div><div class="ct">${fmtDate(calSel)}</div>
        <div class="cact"><button class="btn sm" onclick="openEventModal('${calSel}')">＋ 予定</button></div></div>
      ${selList}
    </div>`;
}

function toggleTiming(el,t){ if(medTiming.includes(t)){medTiming=medTiming.filter(x=>x!==t);el.classList.remove('sel');}else{medTiming.push(t);el.classList.add('sel');} }
function findDrug(q){ q=(q||'').trim().toLowerCase(); if(!q)return null; const all=allDrugs();
  return all.find(d=>d.n.toLowerCase()===q||(d.a||[]).some(a=>a.toLowerCase()===q))||all.find(d=>d.n.toLowerCase().includes(q)||(d.a||[]).some(a=>a.toLowerCase().includes(q))); }
function autoSuggest(){ const q=val('f_mname'); const box=document.getElementById('suggest'); if(!box)return; if(!q){box.innerHTML='';return;}
  const hits=allDrugs().filter(d=>d.n.includes(q)||(d.a||[]).some(a=>a.includes(q))).slice(0,4);
  box.innerHTML=hits.length?`<div style="margin-top:6px" class="chipwrap">${hits.map(d=>`<button type="button" class="chip" onclick="pickDrug('${esc(d.n)}')">${esc(d.n)}</button>`).join('')}</div>`:''; }
function pickDrug(n){ document.getElementById('f_mname').value=n; document.getElementById('suggest').innerHTML=''; lookupForMed(); }
function lookupForMed(){ const q=val('f_mname'); const d=findDrug(q); const box=document.getElementById('suggest');
  if(!d){ box.innerHTML=`<div class="infobox">「${esc(q)}」は内蔵リストにありません。<a href="https://www.google.com/search?q=${encodeURIComponent(q+' 効能 副作用 添付文書')}" target="_blank" rel="noopener">🔎 ネットで調べる</a></div>`; return; }
  box.innerHTML=`<div class="infobox"><b>${esc(d.n)}</b>（${esc(d.c)}）<br><b>効能：</b>${esc(d.e)}<br><b>副作用：</b>${esc(d.s)}<br><b>注意：</b>${esc(d.w)}
    <div style="margin-top:8px"><button class="btn ghost sm" type="button" onclick="applyDrug('${esc(d.n)}')">目的・備考に反映</button></div></div>`; }
function applyDrug(n){ const d=findDrug(n); if(!d)return; const pe=document.getElementById('f_mpurpose'); if(pe&&!pe.value)pe.value=d.e;
  const ne=document.getElementById('f_mnote'); if(ne){ const add=`【副作用】${d.s}\n【注意】${d.w}`; ne.value=ne.value?ne.value+'\n'+add:add; } }
function saveMed(id){ const name=val('f_mname'); if(!name){alert('薬の名前を入力してください');return;} const p=cur(); const sr=val('f_mstock');

  const data={name,dose:val('f_mdose'),timing:[...medTiming],purpose:val('f_mpurpose'),note:val('f_mnote'),start:val('f_mstart'),end:val('f_mend'),

  if(id)Object.assign(p.medications.find(x=>x.id===id),data); else p.medications.push({id:uid(),active:true,...data});
  save(); closeModal(); render(); }

/* 資料（PDF/リンク） */
function openFileModal(){ openModal(`<h3>処方箋・資料を紐付け</h3>
  <p class="muted">Googleドライブでスキャン→PDF化し、「共有リンク」をコピーして貼ってください。NASやクラウドの共有リンクでもOKです。</p>
  <div class="field"><label>名前・ラベル</label><input id="f_flabel" placeholder="例：処方箋 2026年6月分"></div>
  <div class="field"><label>リンク（URL）*</label><input id="f_furl" placeholder="https://drive.google.com/..."></div>
  <div class="field"><label>日付</label><input id="f_fdate" type="date" value="${today()}"></div>
  <div class="foot"><button class="btn subtle block" onclick="closeModal()">キャンセル</button><button class="btn block" onclick="saveFile()">保存</button></div>`);
  setTimeout(()=>document.getElementById('f_furl').focus(),50); }
function saveFile(){ const url=val('f_furl'); if(!/^https?:\/\//.test(url)){alert('https:// で始まる正しいリンクを入力してください');return;}
  const p=cur(); p.files.push({id:uid(),label:val('f_flabel')||'資料',url,date:val('f_fdate')||today()}); save(); closeModal(); render(); }

/* チーム */
function openTeamModal(){ openModal(`<h3>チームメンバー</h3>
  <p class="muted">ホーム上部のアバターに表示されます。看護チームの目印用です（端末内のみ）。</p>
  <div id="teamList">${teamListHtml()}</div>
  <div class="field" style="margin-top:10px"><label>メンバーを追加</label>
    <div style="display:flex;gap:8px"><input id="f_team" placeholder="例：ひかる"><button class="btn" type="button" onclick="addTeam()">追加</button></div></div>
  <div class="foot"><button class="btn subtle block" onclick="closeModal()">閉じる</button></div>`); }
function teamListHtml(){ return db.team.length? db.team.map((m,i)=>`<div class="lrow"><div class="av" style="background:${colorOf(i)};margin:0">${esc(initials(m.name))}</div>
    <div class="grow"><div class="t1">${esc(m.name)}</div></div><button class="btn danger sm" onclick="delTeam('${m.id}')">削除</button></div>`).join('')
  : `<p class="muted">まだメンバーがいません。</p>`; }
function addTeam(){ const n=val('f_team'); if(!n)return; db.team.push({id:uid(),name:n}); save();
  document.getElementById('teamList').innerHTML=teamListHtml(); document.getElementById('f_team').value=''; }
function delTeam(id){ db.team=db.team.filter(x=>x.id!==id); save(); document.getElementById('teamList').innerHTML=teamListHtml(); }

/* 薬を調べる */
function openDrugSearch(){ openModal(`<h3>🔎 薬を調べる</h3>
  <div class="field"><input id="ds_q" placeholder="薬の名前（例：アムロジピン / ロキソニン）" oninput="runDrugSearch()"></div>
  <div id="ds_result"></div>
  <p class="muted" style="margin-top:10px">⚠️ 一般的な内容の目安です。正確な用量・飲み合わせ・最新の注意は添付文書・薬剤師・医師に確認してください。</p>
  <div class="foot"><button class="btn block" onclick="openCustomDrugModal()">＋ 自分で薬を追加</button><button class="btn subtle block" onclick="closeModal()">閉じる</button></div>`);
  setTimeout(()=>document.getElementById('ds_q').focus(),50); runDrugSearch(); }
function drugCard(d){ return `<div class="drug"><div><span class="dn">${esc(d.n)}</span><span class="dc">${esc(d.c)}</span>${d.custom?'<span class="dc" style="background:#fdf2e1;color:#9c6a25;margin-left:4px">マイ追加</span>':''}</div>
  ${d.a&&d.a.length?`<div class="da">別名・製品名：${d.a.map(esc).join('、')}</div>`:''}
  <dl><dt>効能</dt><dd>${esc(d.e)}</dd><dt>副作用</dt><dd>${esc(d.s)}</dd><dt>注意</dt><dd>${esc(d.w)}</dd></dl>
  ${d.custom?`<div style="margin-top:6px;display:flex;gap:6px"><button class="btn ghost sm" onclick="openCustomDrugModal('${esc(d.id)}')">編集</button><button class="btn danger sm" onclick="delCustomDrug('${esc(d.id)}')">削除</button></div>`:''}</div>`; }
function runDrugSearch(){ const q=(val('ds_q')||'').trim(); const box=document.getElementById('ds_result'); if(!box)return; const all=allDrugs();
  if(!q){ const cnt=DRUG_DB.length+(db.customDrugs||[]).length;
    box.innerHTML=`<p class="muted">内蔵 ${DRUG_DB.length}件 ${(db.customDrugs||[]).length?'＋ マイ追加 '+(db.customDrugs||[]).length+'件':''}（計 ${cnt}件）</p><div class="chipwrap">${all.slice(0,12).map(d=>`<button class="chip" onclick="document.getElementById('ds_q').value='${esc(d.n)}';runDrugSearch()">${esc(d.n)}</button>`).join('')}</div>`; return; }
  const hits=all.filter(d=>d.n.includes(q)||d.c.includes(q)||(d.a||[]).some(a=>a.includes(q)));
  box.innerHTML=hits.length? `<p class="muted">${hits.length}件</p>`+hits.map(drugCard).join('')
    : `<div class="infobox">「${esc(q)}」は見つかりませんでした。<br><a href="https://www.google.com/search?q=${encodeURIComponent(q+' 効能 副作用 添付文書')}" target="_blank" rel="noopener">🔎 ネットで調べる</a><div style="margin-top:8px"><button class="btn sm" onclick="openCustomDrugModal('',document.getElementById('ds_q').value)">＋ この名前で追加する</button></div></div>`; }
function openCustomDrugModal(id,prefName){
  const d=id?(db.customDrugs||[]).find(x=>x.id===id):null;
  openModal(`<h3>${d?'マイ薬を編集':'＋ 自分で薬を追加'}</h3>
    <p class="muted">ネットや添付文書で調べた薬を保存できます。次から候補に出ます。</p>
    <div class="field"><label>名前 *</label><input id="cd_n" value="${esc(d?.n||prefName||'')}" placeholder="例：トラムセット配合錠"></div>
    <div class="field"><label>分類</label><input id="cd_c" value="${esc(d?.c||'')}" placeholder="例：鎮痛薬 / 抗生物質"></div>
    <div class="field"><label>別名・製品名（カンマ区切り）</label><input id="cd_a" value="${esc((d?.a||[]).join('、'))}" placeholder="例：トラマール、アセトアミノフェン配合"></div>
    <div class="field"><label>効能（何の薬か）</label><textarea id="cd_e" placeholder="例：中等度〜強い痛みを和らげる">${esc(d?.e||'')}</textarea></div>
    <div class="field"><label>副作用</label><textarea id="cd_s" placeholder="例：吐き気、眠気、便秘">${esc(d?.s||'')}</textarea></div>
    <div class="field"><label>注意</label><textarea id="cd_w" placeholder="例：眠くなるので運転禁止。アルコール厳禁。">${esc(d?.w||'')}</textarea></div>
    <div class="foot">
      ${d?`<button class="btn danger" onclick="delCustomDrug('${d.id}')">削除</button>`:''}
      <button class="btn subtle block" onclick="closeModal();openDrugSearch()">キャンセル</button>
      <button class="btn block" onclick="saveCustomDrug('${id||''}')">保存</button>
    </div>`);
  setTimeout(()=>document.getElementById('cd_n').focus(),50);
}
function saveCustomDrug(id){ const n=val('cd_n'); if(!n){alert('名前を入れてください');return;}
  const a=val('cd_a').split(/[、,]/).map(x=>x.trim()).filter(Boolean);
  const data={n,c:val('cd_c'),a,e:val('cd_e'),s:val('cd_s'),w:val('cd_w')};
  db.customDrugs=db.customDrugs||[];
  if(id){ const x=db.customDrugs.find(x=>x.id===id); if(x)Object.assign(x,data); }
  else db.customDrugs.push({id:uid(),...data});
  save(); closeModal(); openDrugSearch(); document.getElementById('ds_q').value=n; runDrugSearch();
}
function delCustomDrug(id){ if(!confirm('このマイ薬を削除しますか？'))return;
  db.customDrugs=(db.customDrugs||[]).filter(x=>x.id!==id); save(); closeModal(); openDrugSearch(); }

/* バックアップ */
function openBackup(){ openModal(`<h3>バックアップ・共有</h3>
  <p class="muted">データはこの端末の中だけに保存されます。端末の故障・買い替え・データ消去で失われることがあるので、定期的に書き出してください。
  書き出したファイルを共有フォルダ(NAS)に置けば、別の端末や仲間と共有できます。<br>
  読み込みは「最新を取り込む＝<b>上書き</b>」「別の人のデータを合わせる＝<b>追加</b>」。くわしくは別紙「NAS共有・バックアップ手順書」を。</p>
  <div class="field"><button class="btn block" onclick="exportData()">⤓ ファイルに書き出す</button></div>
  <div class="field"><label>ファイルから読み込み</label><input type="file" id="importFile" accept="application/json"></div>
  <div class="foot"><button class="btn subtle block" onclick="closeModal()">閉じる</button></div>`);
  document.getElementById('importFile').addEventListener('change',importData); }
function exportData(){ const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='ナースのドラッグ手帳_'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href); }
function importData(e){ const file=e.target.files[0]; if(!file)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.patients)throw 0;
      const add=confirm('このファイルを読み込みます。\n\n　OK ＝ 今のデータに「追加」（おすすめ）\n　キャンセル ＝ 全部「上書き」');
      if(add){ const md=migrate(d); const inc=md.patients.map(p=>({...p,id:uid()})); db.patients=db.patients.concat(inc);
        currentId=null; const have=new Set(db.board.map(b=>b.id)); let ap=0; md.board.forEach(b=>{if(!have.has(b.id)){db.board.push(b);ap++;}});
        (md.team||[]).forEach(t=>{ if(!db.team.some(x=>x.name===t.name))db.team.push({id:uid(),name:t.name}); });
        db.events=db.events||[]; (md.events||[]).forEach(ev=>{ if(!db.events.some(x=>x.id===ev.id))db.events.push(ev); });
        view='chart'; save(); closeModal(); render(); alert(inc.length+'人を追加しました'+(ap?'（共有ノート'+ap+'件も追加）':''));
      }else{ if(!confirm('本当に今のデータを全部消して上書きしますか？'))return; db=migrate(d); currentId=null; view='home'; save(); closeModal(); render(); alert('上書きで読み込みました'); }
    }catch(err){ alert('読み込めませんでした。正しいファイルを選んでください。'); } };
  r.readAsText(file); }

render();
</script>
